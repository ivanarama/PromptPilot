name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyinstaller

      - name: Build exe
        run: python -m PyInstaller pp.spec --clean

      - name: Create Windows archive
        run: |
          Copy-Item .env.example dist\.env
          Compress-Archive -Path dist\pp.exe, dist\.env, start.ps1, stop.ps1 `
            -DestinationPath "PromptPilot-${{ github.ref_name }}-windows.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: "PromptPilot-${{ github.ref_name }}-windows.zip"

  build-wheel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build wheel
        run: |
          pip install build
          python -m build --wheel --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/

  release:
    needs: [build-exe, build-wheel]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: windows-zip

      - uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: python-dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "PromptPilot ${{ github.ref_name }}"
          body: |
            ## Установка

            ### Windows (exe)
            1. Скачай `PromptPilot-${{ github.ref_name }}-windows.zip`
            2. Распакуй в любую папку
            3. Заполни `.env` (шаблон уже внутри архива)
            4. Запусти `start.ps1` или `pp.exe server`

            ### Linux / Mac / Python
            ```bash
            pip install promptpilot-*.whl
            pp server
            ```
            Или из исходников:
            ```bash
            pip install git+https://github.com/${{ github.repository }}.git@${{ github.ref_name }}
            ```
          files: |
            PromptPilot-${{ github.ref_name }}-windows.zip
            python-dist/*.whl
            python-dist/*.tar.gz
          draft: false
          prerelease: false
